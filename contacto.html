<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto - Fashion Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">Fashion Store</a>
</div>
</nav>

<div class="container mt-5">

<h1 class="text-center mb-4">Contáctanos</h1>

<form id="formContacto" class="col-md-6 mx-auto">

<div class="mb-3">
<label>Nombre</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Correo</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Mensaje</label>
<textarea class="form-control" rows="4" required></textarea>
</div>

<button class="btn btn-dark w-100">Enviar</button>

</form>


<div id="mensajeExito" class="alert alert-success text-center mt-4 d-none">
Formulario enviado correctamente ✅
</div>

</div>

<footer class="mt-5">
<p class="text-center">© 2026 Fashion Store</p>
</footer>

<script>
document.getElementById("formContacto").addEventListener("submit", function(e){
e.preventDefault();

document.getElementById("mensajeExito").classList.remove("d-none");

this.reset();
});
</script>

</body>
</html>
